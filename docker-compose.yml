version: '3.8'

services:
  # 1. Database
  neo4j:
    image: neo4j:5.16.0
    container_name: cdss_graph
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - ./neo4j_data:/data

  # 2. Backend
  backend:
    build: ./backend
    container_name: cdss_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - NEO4J_URI=bolt://cdss_graph:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_API_KEY_1=${OPENROUTER_API_KEY_1}
      - OPENROUTER_API_KEY_2=${OPENROUTER_API_KEY_2}
      - OPENROUTER_API_KEY_3=${OPENROUTER_API_KEY_3}
      - OPENROUTER_API_KEY_4=${OPENROUTER_API_KEY_4}
      - OPENROUTER_API_KEY_5=${OPENROUTER_API_KEY_5}
      - OPENROUTER_API_KEY_6=${OPENROUTER_API_KEY_6}
      - OPENROUTER_API_KEY_7=${OPENROUTER_API_KEY_7}
      - OPENROUTER_API_KEY_8=${OPENROUTER_API_KEY_8}
    depends_on:
      - neo4j

  # 3. Frontend (Đã đổi tên sang frontend-CDSS)
  frontend:
    build: ./frontend-CDSS # 👈 Trỏ vào thư mục frontend-CDSS
    container_name: cdss_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-CDSS:/app # 👈 Đồng bộ code từ thư mục này
      - /app/node_modules
    command: npm run dev -- --host
    environment:
      - CHOKIDAR_USEPOLLING=true

  # 4. Nginx Gateway
  nginx:
    image: nginx:alpine
    container_name: cdss_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
